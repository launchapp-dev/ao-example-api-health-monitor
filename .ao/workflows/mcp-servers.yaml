mcp_servers:
  filesystem:
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "."
    env: {}

  memory:
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-memory"
    env: {}

  sequential-thinking:
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-sequential-thinking"
    env: {}

  github:
    command: npx
    args:
      - "-y"
      - "gh-cli-mcp"
    env:
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
